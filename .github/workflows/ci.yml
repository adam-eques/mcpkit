name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        # Force bash so the coverprofile flag parses consistently across the
        # OS matrix; PowerShell (the Windows default) mangles -flag=value.ext.
        shell: bash
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        run: go build ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
